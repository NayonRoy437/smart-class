<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>University Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="admin.html">
    <button>Open Admin Panel</button>
</a>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>University</h2>

        <ul>
            <li>📊 Dashboard</li>
            <li>👨‍🏫 Teachers</li>
            <li>📚 Students</li>
            <li>📅 Schedule</li>
            <li>📢 Notice</li>
            <li>⚙️ Settings</li>
        </ul>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <h1>Dashboard</h1>

            <div class="clock-box">

                <h3 id="clock"></h3>

                <p id="date"></p>

            </div>

        </div>

        <!-- CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Teachers</h3>
                <h2 id="teachersCount">0</h2>
            </div>

            <div class="card">
                <h3>Total Students</h3>
                <h2 id="studentsCount">0</h2>
            </div>

            <div class="card">
                <h3>Today Classes</h3>
                <h2 id="classCount">0</h2>
            </div>

            <div class="card">
                <h3>Rooms</h3>
                <h2>8</h2>
            </div>

        </div>

        <!-- TABLE -->
        <div class="table-section">

            <h2>Today's Schedule</h2>

            <table>

                <tr>
                    <th>Subject</th>
                    <th>Teacher</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>

                <tbody id="scheduleTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- ONLY ONE SCRIPT -->
<script type="module" src="js/ui.js"></script>

</body>
</html>
